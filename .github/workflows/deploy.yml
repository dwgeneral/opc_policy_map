name: Deploy to Volcengine TOS

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect Node project
        id: detect
        run: |
          if [ -f "package.json" ]; then
            echo "IS_NODE=true" >> $GITHUB_ENV
          else
            echo "IS_NODE=false" >> $GITHUB_ENV
          fi

      - name: Set up Node.js
        if: env.IS_NODE == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: env.IS_NODE == 'true'
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Build project
        if: env.IS_NODE == 'true'
        run: |
          if npm run | grep -qE '^  build'; then
            npm run build
          else
            echo "No build script found, skipping build"
          fi

      - name: Detect build output directory
        run: |
          for d in out dist build public .; do
            if [ -d "$d" ] && [ -f "$d/index.html" ]; then
              echo "BUILD_DIR=$d" >> $GITHUB_ENV
              echo "Using build directory: $d"
              exit 0
            fi
          done
          echo "Build output directory with index.html not found"
          exit 1

      - name: Verify build output
        run: |
          test -f "$BUILD_DIR/index.html"
          ls -la "$BUILD_DIR" | head -20

      - name: Install AWS CLI
        run: |
          curl -sS "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update || sudo ./aws/install
          aws --version

      - name: Configure AWS CLI for Volcengine TOS
        run: |
          aws configure set aws_access_key_id "${{ secrets.VOLC_AK }}"
          aws configure set aws_secret_access_key "${{ secrets.VOLC_SK }}"
          aws configure set default.region cn-beijing
          aws configure set s3.addressing_style virtual

      - name: Upload to TOS
        run: |
          aws s3 sync "$BUILD_DIR"/ s3://opcpolicymap/ \
            --endpoint-url https://tos-s3-cn-beijing.volces.com \
            --region cn-beijing \
            --delete

      - name: Configure Static Website Hosting
        run: |
          aws s3 website s3://opcpolicymap/ \
            --index-document index.html \
            --error-document index.html \
            --endpoint-url https://tos-s3-cn-beijing.volces.com \
            --region cn-beijing

      # 如需在部署后自动刷新 CDN，请先在 GitHub Secrets 中配置 CDN_DOMAIN（例如：www.example.com）
      - name: Refresh CDN cache
        if: ${{ secrets.CDN_DOMAIN != '' }}
        run: |
          # 构造刷新 URL（支持目录刷新，默认刷新整个站点）
          REFRESH_URL="https://${{ secrets.CDN_DOMAIN }}/"
          echo "Refreshing CDN cache for: $REFRESH_URL"
          # 调用火山引擎 CDN 刷新 API
          resp=$(curl -s -w "\n%{http_code}" -X POST "https://cdn.volcengineapi.com/?Action=SubmitRefreshTask&Version=2021-03-01" \
            -H "Content-Type: application/json" \
            -H "X-Date: $(date -u '+%Y%m%dT%H%M%SZ')" \
            -u "${{ secrets.VOLC_AK }}:${{ secrets.VOLC_SK }}" \
            -d "{
              \"Type\": \"dir\",
              \"UrlList\": [\"$REFRESH_URL\"]
            }")
          http_code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          if [ "$http_code" -eq 200 ]; then
            task_id=$(echo "$body" | jq -r '.Result.TaskID // empty')
            echo "CDN 刷新任务提交成功，TaskID: $task_id"
          else
            echo "CDN 刷新调用失败，HTTP 状态码: $http_code"
            echo "响应: $body"
          fi
